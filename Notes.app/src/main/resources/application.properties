spring.datasource.url=jdbc:mysql://localhost:3306/NotesApp?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.servlet.context-path=/api
server.port=8081

logging.level.com.myself.app=debug
server.servlet.encoding.charset=UTF-8
sms.mode=logsms.mode=log

# Configuration pour permettre l'envoi de fichiers volumineux
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-post-size=10MB