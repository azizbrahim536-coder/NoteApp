spring.application.name=NotesApp

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/NotesApp?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Configuration JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Configuration du serveur
server.port=8081
server.servlet.context-path=/api

# Encodage UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Logs du projet
logging.level.com.aziz.notesapp=DEBUG